<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetix Engine | Bare-Metal WASM Physics</title>
    <style>
        /* Modern Reset & Dark System Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glow */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 10%;
            left: 10%;
            z-index: 0;
            pointer-events: none;
        }

        /* Main Container */
        .app-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            max-width: 500px;
            padding: 1rem;
        }

        /* Header Styling */
        header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #2dd4bf, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        p {
            font-size: 0.85rem;
            color: #9ca3af;
            font-family: monospace;
        }

        /* Glassmorphism Viewport Frame */
        .render-window {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: #030712;
            border-radius: 8px;
            border: 1px solid rgba(20, 184, 166, 0.2);
            display: block;
            width: 100%;
            aspect-ratio: 1 / 1;
            max-width: 400px;
        }

        /* Technical Telemetry Dashboard */
        .telemetry {
            width: 100%;
            background: rgba(17, 24, 39, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            font-family: monospace;
            font-size: 0.75rem;
            color: #6b7280;
        }

        .metric span {
            color: #2dd4bf;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>KINETIX CORE</h1>
            <p>Bare-Metal WebAssembly Physics Engine</p>
        </header>

        <div class="render-window">
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>

        <div class="telemetry">
            <div class="metric">ENGINE: <span>WASM (FPU)</span></div>
            <div class="metric">SIZE: <span>95 BYTES</span></div>
            <div class="metric">TARGET: <span>60 FPS</span></div>
        </div>
    </div>

    <script src="frontend.js"></script>
</body>
</html>
